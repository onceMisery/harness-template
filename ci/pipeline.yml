name: harness-pipeline

on:
  push:
  pull_request:

jobs:
  validate-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/bootstrap_harness.py
      - run: python scripts/validate_feature_schema.py
      - run: python scripts/validate_contract_consistency.py
